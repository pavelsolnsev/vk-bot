# Деплой на VPS по SSH. .env в репозитории нет и в git не входит —
# на сервере файл создаётся один раз вручную; при каждом push он не перезаписывается.
name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — pull и зависимости
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -d .git ]; then
              echo "DEPLOY_PATH не является клоном Git: $(pwd)"
              echo "На сервере выполни git clone в этот каталог или поправь секрет DEPLOY_PATH (нужна папка с .git)."
              exit 1
            fi
            git fetch origin
            git checkout master
            git pull --ff-only origin master
            npm ci --omit=dev
            ${{ secrets.DEPLOY_RESTART_CMD }}
